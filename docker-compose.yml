services:
  app:
    image: ${IMAGE_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: address-book-app
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: ${PORT}
      MONGODB_URI: ${MONGODB_URI}
      SECRET: ${SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: address-book-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
